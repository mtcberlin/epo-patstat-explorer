services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - BIGQUERY_PROJECT=${BIGQUERY_PROJECT:-patstat-mtc}
      - BIGQUERY_DATASET=${BIGQUERY_DATASET:-patstat}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/gcp-sa.json
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - QUERY_PROVIDER=${QUERY_PROVIDER:-claude}
    volumes:
      - ${GCP_CREDENTIALS_PATH:-./.streamlit/gcp-sa.json}:/app/credentials/gcp-sa.json:ro
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
